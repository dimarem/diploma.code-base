include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - build
  - image
  - release

variables:
  VERSION: 1.0.${CI_PIPELINE_ID}

sonarqube-test:
  stage: test
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  script:
    - cd backend
    - >
      sonar-scanner
        -Dsonar.projectKey="${SONAR_PROJECT_KEY_BACK}"
        -Dsonar.sources=.
        -Dsonar.host.url="${SONARQUBE_URL}"
        -Dsonar.login="${SONAR_LOGIN_BACK}"

build-backend-app:
  stage: build
  script:        
    - cd backend
    - go mod download
    - CGO_ENABLED=0 GOOS=linux go build -o /build/main ./cmd/api
  artifacts:
    paths:
      - backend/main

create-image:
  stage: image
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/backend"
      --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/backend:$CI_COMMIT_SHA"
      --build-arg VERSION=$VERSION
      --cache=true

tag-image:
  stage: image
  needs:
    - create-image
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [ "" ]
  cache: [ ]
  before_script:
    - crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - crane tag $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA $VERSION

upload-code-to-nexus:
  stage: release
  script:
    - cd backend
    - tar czvf momo-store-${VERSION}.tar.gz main
    - >
     curl -v -u "${NEXUS_REPO_USER}:${NEXUS_REPO_PASS}"
     --upload-file momo-store-${VERSION}.tar.gz
     ${NEXUS_REPO_URL}/repository/${NEXUS_REPO_BACKEND_NAME}/${VERSION}/momo-store-${VERSION}.tar.gz
  allow_failure: true
