include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - build
  - release

variables:
  VERSION: 1.0.${CI_PIPELINE_ID}
  GO_VERSION: "1.23-alpine"

sonarqube-test:
  stage: test
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  script:
    - cd backend
    - >
      sonar-scanner
      -Dsonar.projectKey="${SONAR_PROJECT_KEY_BACK}"
      -Dsonar.sources=.
      -Dsonar.host.url="${SONARQUBE_URL}"
      -Dsonar.login="${SONAR_LOGIN_BACK}"

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/backend"
      --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/backend:$CI_COMMIT_SHA"
      --build-arg VERSION=$VERSION
      --build-arg GO_VERSION=$GO_VERSION
      --cache=true

tag-image:
  stage: build
  needs:
    - build-image
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [ "" ]
  cache: [ ]
  before_script:
    - crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - crane tag $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA $VERSION

build-app:
  stage: build
  needs:
    - build-image
  image: golang:${GO_VERSION}
  script:
    - cd backend
    - go mod download
    - CGO_ENABLED=0 GOOS=linux go build -o main ./cmd/api
  artifacts:
    paths:
      - backend/main
    expire_in: 1 hour

upload-to-nexus:
  stage: release
  needs:
    - build-app
  script:
    - cd backend
    - ls -la
