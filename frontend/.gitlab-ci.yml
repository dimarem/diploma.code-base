include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - test
  - build
  - release

variables:
  VERSION: 1.0.${CI_PIPELINE_ID}
  NODEJS_VERSION: "20-alpine3.19"

sonarqube-test:
  stage: test
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  script:
    - cd frontend
    - >
      sonar-scanner
      -Dsonar.projectKey="${SONAR_PROJECT_KEY_FRONT}"
      -Dsonar.sources=.
      -Dsonar.host.url="${SONARQUBE_URL}"
      -Dsonar.login="${SONAR_LOGIN_FRONT}"

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/frontend"
      --dockerfile "${CI_PROJECT_DIR}/frontend/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/frontend:$CI_COMMIT_SHA"
      --build-arg VERSION=$VERSION
      --build-arg NODEJS_VERSION=$NODEJS_VERSION
      --cache=true

tag-image:
  stage: build
  needs:
    - build-image
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [ "" ]
  cache: [ ]
  before_script:
    - crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - crane tag $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA $VERSION

build-app:
  stage: build
  needs:
    - build-image
  image: node:${NODEJS_VERSION}
  script:        
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 hour

upload-to-nexus:
  stage: release
  needs:
    - build-app
  script:
    - cd frontend
    - tar czvf momo-store-${VERSION}.tar.gz dist
    - >
     curl -v -u "${NEXUS_REPO_USER}:${NEXUS_REPO_PASS}"
     --upload-file momo-store-${VERSION}.tar.gz
     ${NEXUS_REPO_URL}/repository/${NEXUS_REPO_FRONTEND_NAME}/${VERSION}/momo-store-${VERSION}.tar.gz
  allow_failure: true
